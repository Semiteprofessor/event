spring:
  application:
    name: event-management

  mail:
    username: ${EMAIL_USER}
    password: ${EMAIL_PASSWORD}
    host: smtp.gmail.com
    port: 587
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  web:
    error:
      whitelabel:
        enabled: true
  mongodb:
    uri: ${MONGO_URI}

server:
  port: 8899

app:
  base-url: http://localhost:8899

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000